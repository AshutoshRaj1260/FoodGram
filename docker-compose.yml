version: '3.8'

services:
  mongodb:
    image: mongo:7.0.5
    container_name: foodgram-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "rs.status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2.4
    container_name: foodgram-redis
    ports:
      - "6379:6379"

  mongo-init:
    image: mongo:7.0.5
    container_name: foodgram-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      mongosh --host mongodb:27017 --eval '
        try {
          rs.status();
        } catch (e) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "mongodb:27017" }]
          });
        }
      '

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodgram-app
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
      - mongo-init

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodgram-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
